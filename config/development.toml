# Development Environment Configuration

[app]
environment = "development"
features = { routeLogging = true }

[database]
host = "localhost"
port = 5432
name = "app_dev"
debug = true
[database.discovery]
warn_when_no_entities = false

[redis]
db = 0
key_prefix = "dev:"

[logger]
level = "debug"
format = "pretty"

[security]
jwt_secret = "dev-secret-key-not-for-production"
