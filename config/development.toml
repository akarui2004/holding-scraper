# Development Environment Configuration

[app]
name = "Holding Scraper"
version = "1.0.0"
port = 3000
host = "0.0.0.0"

[database]
host = "localhost"
port = 5432
name = "app_dev"
debug = true
[database.discovery]
warn_when_no_entities = false

[redis]
db = 0
key_prefix = "dev:"

[logger]
level = "debug"
format = "pretty"

[security]
jwt_secret = "dev-secret-key-not-for-production"
